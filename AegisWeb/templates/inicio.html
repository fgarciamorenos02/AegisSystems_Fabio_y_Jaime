{% extends 'base.html' %}

{% block content %}
<section class="relative h-[600px] flex items-center justify-center overflow-hidden">
    <div class="absolute inset-0 z-0">
        <div class="absolute inset-0 bg-gradient-to-b from-black/20 via-black/80 to-black z-10"></div>
        <div
            class="w-full h-full bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-gray-800 via-black to-black opacity-50">
        </div>
    </div>

    <div class="relative z-20 text-center max-w-4xl mx-auto px-6 animate-[fadeIn_1s_ease-out]">
        <h1
            class="text-5xl md:text-7xl font-extrabold tracking-tighter mb-6 bg-clip-text text-transparent bg-gradient-to-r from-white via-gray-400 to-gray-600 uppercase">
            Aegis Systems
        </h1>
        <p class="text-xl md:text-2xl text-gray-400 mb-10 font-light tracking-wide uppercase">
            Infraestructura Cloud de Vanguardia
        </p>
        <div class="flex flex-col md:flex-row gap-4 justify-center">
            <a href="/precios"
                class="px-8 py-3 bg-white text-black font-bold uppercase tracking-wider hover:bg-gray-200 transition-all rounded">
                Ver Planes
            </a>
            <a href="/contacto"
                class="px-8 py-3 border border-white/30 text-white font-bold uppercase tracking-wider hover:bg-white/10 transition-all rounded">
                Contactar
            </a>
        </div>
    </div>
</section>
{% endblock %}
